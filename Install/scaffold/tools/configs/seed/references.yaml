# references.yaml — Seed config for reference/architecture docs

layer: references
display_name: "References & Architecture"
template: null
index_file: null

preflight:
  required_files:
    - design/systems/_index.md
    - design/design-doc.md
  blocked_message: "Design doc and system designs must exist before seeding references."

upstream_sources:
  - type: system
    glob: "design/systems/SYS-*-*.md"
    extract: "Systems provide owned state, dependencies, state lifecycle, player actions"
  - type: design
    glob: "design/design-doc.md"
    extract: "Design doc provides governance constraints"

dependency_checks: []

coverage_rules:
  - "Every system Owned State entry appears in authority.md"
  - "Every system dependency has an interface contract"
  - "Every system State Lifecycle has a state machine in state-transitions.md"
  - "Every system with signals has entries in signal-registry.md"
  - "Every entity from Owned State has an entity-components entry"
